<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Euro 2028 Predictor — Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        color: #172033;
        background: #edf2f7;
      }
      main {
        width: min(420px, 100%);
        padding: 32px;
        background: #fff;
        border: 1px solid #d9e1ea;
        border-radius: 20px;
        box-shadow: 0 14px 40px rgba(39, 58, 83, 0.08);
        text-align: center;
      }
      strong { display: block; color: #075c9a; font-size: 42px; }
      h1 { margin: 12px 0 8px; font-size: 24px; }
      p { margin: 0 0 22px; color: #64748b; line-height: 1.6; }
      button {
        padding: 11px 18px;
        color: #fff;
        background: #075c9a;
        border: 0;
        border-radius: 10px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>28</strong>
      <h1>Euro staging is offline</h1>
      <p>The read-only tournament model needs an internet connection. No prediction features are enabled in this foundation build.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
