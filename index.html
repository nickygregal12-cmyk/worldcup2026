<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WC26" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Fonts — preconnect + link is faster than CSS @import (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" />

    <!-- SEO -->
    <title>WC26 Predictor</title>
    <meta name="description" content="Predict every FIFA World Cup 2026 match and compete with friends. Free to play." />

    <!-- Open Graph -->
    <meta property="og:title" content="WC26 Predictor" />
    <meta property="og:description" content="Predict every FIFA World Cup 2026 match and compete with friends. Free to play." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wc26predictor1.netlify.app" />
    <meta property="og:image" content="https://wc26predictor1.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WC26 Predictor" />
    <meta name="twitter:description" content="Predict every FIFA World Cup 2026 match and compete with friends." />
    <meta name="twitter:image" content="https://wc26predictor1.netlify.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Load Twemoji without blocking rendering. Only parse newly inserted flag nodes while idle. -->
    <script async src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
      (() => {
        const queue = new Set()
        let scheduled = false

        const parseNode = (node) => {
          if (!window.twemoji || !node || node.nodeType !== Node.ELEMENT_NODE) return
          window.twemoji.parse(node, {
            folder: 'svg', ext: '.svg',
            base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/',
            callback: (icon, options) => {
              if (icon.length === 4 && icon.startsWith('1f1')) return `${options.base}${options.size}/${icon}${options.ext}`
              return false
            }
          })
        }

        const flush = () => {
          scheduled = false
          queue.forEach(parseNode)
          queue.clear()
        }

        const schedule = () => {
          if (scheduled) return
          scheduled = true
          if ('requestIdleCallback' in window) requestIdleCallback(flush, { timeout: 500 })
          else setTimeout(flush, 100)
        }

        const start = () => {
          const root = document.getElementById('root')
          if (!root) return
          queue.add(root)
          schedule()
          new MutationObserver((mutations) => {
            mutations.forEach((mutation) => mutation.addedNodes.forEach((node) => {
              if (node.nodeType === Node.ELEMENT_NODE) queue.add(node)
            }))
            schedule()
          }).observe(root, { childList: true, subtree: true })
        }

        window.addEventListener('load', start, { once: true })
      })()
    </script>
  </body>
</html>
