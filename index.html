<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WC26" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- SEO -->
    <title>WC26 Predictor</title>
    <meta name="description" content="Predict every FIFA World Cup 2026 match and compete with friends. Free to play." />

    <!-- Open Graph -->
    <meta property="og:title" content="WC26 Predictor" />
    <meta property="og:description" content="Predict every FIFA World Cup 2026 match and compete with friends. Free to play." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wc26predictor1.netlify.app" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="WC26 Predictor" />
    <meta name="twitter:description" content="Predict every FIFA World Cup 2026 match and compete with friends." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Twemoji: renders flag emojis on Windows -->
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
      // Parse emojis after each React render
      const observer = new MutationObserver(() => {
        if (typeof twemoji === 'undefined') return
        twemoji.parse(document.body, {
          folder: 'svg', ext: '.svg',
          base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/',
          callback: (icon, options) => {
            // Only replace flag emojis (regional indicator sequences)
            if (icon.length === 4 && icon.startsWith('1f1')) return `${options.base}${options.size}/${icon}${options.ext}`
            return false // don't replace other emojis
          }
        })
      })
      document.addEventListener('DOMContentLoaded', () => {
        observer.observe(document.getElementById('root'), { childList: true, subtree: true })
      })
    </script>
  </body>
</html>
