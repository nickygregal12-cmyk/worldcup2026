name: Euro 2028 checks

on:
  pull_request:
  push:
    branches:
      - euro28-development

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint new foundation code
        run: npm run lint:foundation

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
