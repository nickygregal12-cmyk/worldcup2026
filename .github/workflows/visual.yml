# Visual tier — separate from the main check chain by design: it needs a
# browser and a seeded local database, so it runs only when visual-affecting
# paths change (keep these filters aligned with WATCHED_GLOBS in
# visual-tests/visual.config.mjs).
name: visual-tier

on:
  push:
    branches: [euro28-development]
    paths:
      - 'src/**/*.css'
      - 'src/**/*.jsx'
      - 'docs/reference-prototypes/**'
      - 'visual-tests/**'
      - 'visual-baselines/**'
  pull_request:
    paths:
      - 'src/**/*.css'
      - 'src/**/*.jsx'
      - 'docs/reference-prototypes/**'
      - 'visual-tests/**'
      - 'visual-baselines/**'

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase and apply migrations
        run: supabase start && supabase migration up --local
      - name: Point the build at local Supabase
        run: |
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" > .env.local
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status -o json | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>console.log(JSON.parse(s).ANON_KEY))')" >> .env.local
      - name: Seed canonical visual fixture
        run: npm run visual:seed
        env:
          VISUAL_LOCAL_DB_CONTAINER: supabase_db_euro28predictor
      - name: Capture and regress
        run: npm run check:visual
      - name: Conformance report (advisory)
        if: always()
        run: npm run visual:diff || true
      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-artifacts
          path: visual-artifacts/
          retention-days: 14
