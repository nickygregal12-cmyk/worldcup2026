name: Sync Match Scores

on:
  schedule:
    # Every 15 mins during match hours (18:00–23:00 UTC) — covers 19:00–00:00 BST
    - cron: '0,15,30,45 18-23 * * *'
    # Every hour overnight (00:00–17:00 UTC)
    - cron: '0 0-17 * * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score sync
        env:
          ADMIN_FUNCTION_SECRET: ${{ secrets.ADMIN_FUNCTION_SECRET }}
        run: |
          if [ -z "$ADMIN_FUNCTION_SECRET" ]; then
            echo "Missing required ADMIN_FUNCTION_SECRET repository secret"
            exit 1
          fi
          STATUS=$(curl --silent --show-error --output sync-response.json --write-out "%{http_code}" --request POST \
            --header "x-admin-secret: $ADMIN_FUNCTION_SECRET" \
            https://wc26predictor1.netlify.app/.netlify/functions/sync-scores)
          echo "Sync response: $STATUS"
          cat sync-response.json
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Sync failed with status $STATUS"
            exit 1
          fi
