[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

# Push notifications triggered via Supabase pg_cron instead of Netlify scheduler
# (Netlify scheduled functions require Pro tier)
