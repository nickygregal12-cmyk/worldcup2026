document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a78453fd-fff1-4630-938e-35960d8d5184\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"51a4d022-6bf0-4ef5-a659-b1c885316f8d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  \n  <style>\n    doc-page:not(:defined){visibility:hidden}\n    body{ background:#e7ecf3; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"doc-page\" from=\"57e67a27-30c9-47a7-a22c-b2371c5314d1#/doc-page.js\" hint-size=\"100%,100%\">\n<doc-page size=\"letter\" margin=\"0.85in\" style=\"font-family:'Public Sans',sans-serif; color:#101826; font-size:11.5pt; line-height:1.55;\">\n\n<div style=\"margin-bottom:36px;\">\n  <div style=\"font-family:'Big Shoulders Display',sans-serif; font-weight:600; letter-spacing:.14em; text-transform:uppercase; font-size:11pt; color:#2563A6;\">Euro 2028 Predictor — Design Polish<\u002Fdiv>\n  <h1 style=\"font-family:'Big Shoulders Display',sans-serif; font-weight:800; font-size:42pt; line-height:1.02; margin:6px 0 4px; color:#0B1B34;\">Design direction &amp; component system<\u002Fh1>\n  <p style=\"font-size:13pt; color:#4B5768; margin:0;\">Stage 2 (final design direction) and Stage 3 (reusable components). Reference only — no production code. Governs Stages 4–6 that follow.<\u002Fp>\n<\u002Fdiv>\n\n<h2 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:22pt; border-bottom:2px solid #0B1B34; padding-bottom:6px; margin-top:8px;\">Stage 2 — Final design direction<\u002Fh2>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">1. Visual style<\u002Fh3>\n<p>A premium tournament companion, not a SaaS dashboard: deep navy and white as the base, one bright action blue, sparing broadcast imagery on hero moments only, and a scoreboard-flavoured display face for numbers and headings. Calm on data-heavy pages, confident on entry/celebration moments. No gradients-as-decoration, no emoji, no rounded-card-with-left-accent-stripe cliché — hierarchy comes from type scale, spacing and colour-coded state, not borders.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">2. Typography hierarchy<\u002Fh3>\n<sc-raw-table style=\"width:100%; border-collapse:collapse; margin-top:8px;\">\n<sc-raw-tr style=\"border-bottom:1px solid #D9E0EA;\"><sc-raw-td style=\"padding:6px 8px 6px 0; font-weight:600; width:26%;\">Role<\u002Fsc-raw-td><sc-raw-td style=\"padding:6px 0; font-weight:600;\">Face / size / weight<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:6px 8px 6px 0;\">Page hero title<\u002Fsc-raw-td><sc-raw-td style=\"padding:6px 0; font-family:'Big Shoulders Display',sans-serif; font-weight:800; font-size:15pt;\">Big Shoulders Display 800, 30–36px mobile / 44px desktop<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:6px 8px 6px 0;\">Section heading<\u002Fsc-raw-td><sc-raw-td style=\"padding:6px 0; font-family:'Big Shoulders Display',sans-serif; font-weight:700;\">Big Shoulders Display 700, 18–20px<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:6px 8px 6px 0;\">Card title<\u002Fsc-raw-td><sc-raw-td style=\"padding:6px 0; font-family:'Big Shoulders Display',sans-serif; font-weight:600;\">Big Shoulders Display 600, 16px<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:6px 8px 6px 0;\">Body<\u002Fsc-raw-td><sc-raw-td style=\"padding:6px 0; font-family:'Public Sans',sans-serif; font-weight:400;\">Public Sans 400, 15px / 1.5<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:6px 8px 6px 0;\">Secondary / muted<\u002Fsc-raw-td><sc-raw-td style=\"padding:6px 0;\">Public Sans 400–500, 13px<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:6px 8px 6px 0;\">Eyebrow / label<\u002Fsc-raw-td><sc-raw-td style=\"padding:6px 0;\">Public Sans 700, 11px, +8% tracking, uppercase<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<sc-raw-tr><sc-raw-td style=\"padding:6px 8px 6px 0;\">Scores, ranks, countdowns, points<\u002Fsc-raw-td><sc-raw-td style=\"padding:6px 0; font-family:'Big Shoulders Display',sans-serif; font-weight:700;\">Big Shoulders Display 700, tabular numerals always<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n<\u002Fsc-raw-table>\n<p style=\"margin-top:10px;\">Big Shoulders Display is condensed and scoreboard-flavoured — it reads as sport, not software, and stays legible at the large sizes hero moments need. Public Sans carries every paragraph, label and table cell — it's neutral, dense-friendly and holds up at small mobile sizes. Two faces only, no third accent font.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">3. Spacing scale<\u002Fh3>\n<p>4px base unit: <b>4, 8, 12, 16, 20, 24, 32, 48, 64<\u002Fb>. Card internal padding 16px mobile / 20px desktop. Section gaps 24px mobile / 32px desktop. Never hand-tune an odd value — every margin/padding traces to this scale.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">4. Colour usage<\u002Fh3>\n<div style=\"display:flex; gap:10px; margin:10px 0; flex-wrap:wrap;\">\n<div style=\"width:150px;\"><div style=\"height:40px; border-radius:6px; background:#0B1B34;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Ink navy — text, dark surfaces<br><code>#0B1B34<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:40px; border-radius:6px; background:#163B73;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Brand navy — header, hero, primary chrome<br><code>#163B73<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:40px; border-radius:6px; background:#0284C7;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Action blue — buttons, links, active state<br><code>#0284C7<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:40px; border-radius:6px; background:#F4F7FB; border:1px solid #D9E0EA;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Page surface<br><code>#F4F7FB<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:40px; border-radius:6px; background:#FFFFFF; border:1px solid #D9E0EA;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Raised card surface<br><code>#FFFFFF<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"display:flex; gap:10px; margin:4px 0 10px; flex-wrap:wrap;\">\n<div style=\"width:150px;\"><div style=\"height:32px; border-radius:6px; background:#DCFCE7; border:1px solid #86D9A6;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Success / confirmed<br><code>#15803D on #DCFCE7<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:32px; border-radius:6px; background:#FDF1DC; border:1px solid #EBC077;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Warning / provisional<br><code>#B45309 on #FDF1DC<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:32px; border-radius:6px; background:#FCE8E8; border:1px solid #F0A9A9;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Danger / error<br><code>#B91C1C on #FCE8E8<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:32px; border-radius:6px; background:#FEE2E2; border:1px solid #F3A5A5;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Live only — never reused<br><code>#DC2626 on #FEE2E2<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:32px; border-radius:6px; background:#EEF1F5; border:1px solid #D3DAE3;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Locked<br><code>#57657A on #EEF1F5<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<div style=\"width:150px;\"><div style=\"height:32px; border-radius:6px; background:#FBF3DC; border:1px solid #E4CE8E;\"><\u002Fdiv><div style=\"font-size:10.5px; margin-top:3px;\">Joker only — reserved<br><code>#A6790A on #FBF3DC<\u002Fcode><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<p>Colour is semantic, never decorative. Green/amber/red/live-red/locked-grey/joker-gold each mean exactly one thing across the whole app; a page may never repurpose one for something else (e.g. amber must always mean \"not final yet,\" never \"warning about an unrelated thing\"). Dark theme mirrors every pairing at matching contrast — same roles, darker surfaces, brighter text. Joker gold appears nowhere except the joker control and joker badges.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">5. Card hierarchy<\u002Fh3>\n<p><b>Broadcast hero card<\u002Fb> — full-bleed image + navy scrim, used once per page at most, for countdowns and arrival moments only.<br>\n<b>Primary card<\u002Fb> — white surface, 16px radius, 1px border, used for a page's main content block (a bracket match, a group table, a league).<br>\n<b>Compact row card<\u002Fb> — 44–56px tall, used inside lists (fixtures, players, leagues) — never nests a full primary card inside it.<br>\n<b>Utility card<\u002Fb> — flat, sunken-surface background, no border, used for secondary/reference info (rules, facts, settings) so it visually recedes behind primary cards.<br>\nOne nesting level maximum, always. A card never contains another bordered card.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">6. Button hierarchy<\u002Fh3>\n<p><b>Primary<\u002Fb> — filled action blue, white text, one per screen/section, the single next step (e.g. \"Finish your predictions\").<br>\n<b>Secondary<\u002Fb> — outline navy/blue, used for parallel or lower-commitment actions (e.g. \"How scoring works\").<br>\n<b>Tertiary / ghost<\u002Fb> — text-only with icon, used for row-level or in-card actions (e.g. \"Copy invite\").<br>\n<b>Destructive<\u002Fb> — red outline by default, red fill only on final confirm, confined to a clearly labelled danger zone (account/league deletion).<br>\nMinimum 48px tap height on mobile. Loading state keeps the button's width and swaps label for a spinner — never collapses or reflows.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">7. Status chip system<\u002Fh3>\n<div style=\"display:flex; gap:8px; flex-wrap:wrap; margin:10px 0;\">\n<span style=\"background:#DCFCE7; color:#15803D; border-radius:999px; padding:4px 12px; font-size:11px; font-weight:700;\">✓ CONFIRMED<\u002Fspan>\n<span style=\"background:#FDF1DC; color:#B45309; border-radius:999px; padding:4px 12px; font-size:11px; font-weight:700;\">◔ PROVISIONAL<\u002Fspan>\n<span style=\"background:#FEE2E2; color:#DC2626; border-radius:999px; padding:4px 12px; font-size:11px; font-weight:700;\">● LIVE<\u002Fspan>\n<span style=\"background:#EEF1F5; color:#57657A; border-radius:999px; padding:4px 12px; font-size:11px; font-weight:700;\">🔒 LOCKED<\u002Fspan>\n<span style=\"background:#FBF3DC; color:#A6790A; border-radius:999px; padding:4px 12px; font-size:11px; font-weight:700;\">★ JOKER<\u002Fspan>\n<span style=\"background:#E7F0FC; color:#0284C7; border-radius:999px; padding:4px 12px; font-size:11px; font-weight:700;\">ⓘ INFO<\u002Fspan>\n<\u002Fdiv>\n<p>Six roles only: confirmed (green), provisional/pending (amber), live (red, pulsing dot), locked (slate), joker (gold), neutral info (blue outline). Every chip pairs an icon with the label — colour is never the sole signal. A page should rarely show more than two chip colours in one view; if everything is amber, the amber has stopped meaning anything.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">8. Icon usage<\u002Fh3>\n<p>One outline icon set throughout (Lucide-equivalent), 1.75px stroke, 20px inline / 24px in nav and buttons. Icons always sit beside a text label except inside the bottom nav, where the label is printed below. No emoji, no emoji flags — flags are circular ISO-keyed team badges; unresolved teams use a neutral dashed placeholder chip, never a blank or a joke.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">9. Bottom navigation rules<\u002Fh3>\n<p>Five items, fixed: <b>Groups | Bracket | Home | Leagues | More<\u002Fb> (Position 1 becomes KO only at full Round-of-16 readiness, per product rules — unchanged). Home sits centred as a raised circle overlapping the bar's top edge; every icon across all five items shares one baseline and every label sits on a second shared baseline underneath — the circle overlaps the line, it does not float the whole item upward. Active item: filled icon + action-blue label + medium weight; inactive: outline icon + muted grey. Minimum 48px touch target per item, safe-area padding at the bottom on iOS.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">10. Broadcast-image background rules<\u002Fh3>\n<p>Stadium/pitch/crowd photography is reserved for arrival moments only: Welcome, the Home countdown hero, Tournament Overview's header, and a league's own hero strip. It is never used behind a table, list, form, or any data-dense page — those stay clean white/navy-text on light surface for legibility. Every photo carries a navy gradient scrim (deeper at the text edge, ~85% opacity, fading to ~30%) so white text always clears 4.5:1 contrast. Existing files (hero-bg.jpg, leagues-bg.jpg, leaderboard-bg.jpg, howtoplay-bg.jpg, awards-bg.jpg) are used as placeholders, croppable/swappable later — the app must degrade gracefully to a flat navy hero if an image fails to load.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">11. Table / list density rules<\u002Fh3>\n<p>Row height: 44px mobile, 40px desktop. Numeric columns (P/W/D/L/GD/Pts) right-aligned, tabular numerals, bold on the primary sort column only. Top-2 qualifying rows carry a 3px left accent bar in action blue; third-place watchlist rows sit below a dashed divider rather than in a separate disconnected block. Sticky column header once a table exceeds 6 rows. No zebra striping — hairline dividers (1px, border colour) carry the rhythm instead, which reads calmer at high density.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">12. Modal / sheet rules<\u002Fh3>\n<p>Mobile: bottom sheet, slide-up, 20px top-corner radius, drag handle, max-height 85vh with internal scroll, primary action pinned to the sheet's bottom edge above the safe area. Desktop: centred modal card, 480–560px width, no drag handle. Both: Escape and backdrop-tap close, focus trapped, background scroll locked, focus returns to the triggering element on close.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#0B1B34; margin-top:26px;\">13. Loading, locked, empty, error and offline states<\u002Fh3>\n<p><b>Loading<\u002Fb> — skeleton shimmer matching the real layout's shape (never a spinner-only screen); a dynamic page must never flash the wrong state before settling.<br>\n<b>Locked<\u002Fb> — content visually present but muted (reduced-opacity team names, no input affordances), a slate \"Locked\" chip, and — critically — no \"Edit\" action anywhere once kick-off has passed; the card instead links to Match Centre.<br>\n<b>Empty<\u002Fb> — a short, specific sentence (never \"No data\"), one clear next action, an outline icon, no illustration filler.<br>\n<b>Error<\u002Fb> — calm, non-alarming copy, a retry action, never a raw error string or stack trace.<br>\n<b>Offline<\u002Fb> — a persistent, dismissible banner rather than a full-page takeover; cached/last-known data stays visible and is timestamped \"as of…\".<\u002Fp>\n\n<div style=\"height:1px; background:#D9E0EA; margin:34px 0;\"><\u002Fdiv>\n\n<h2 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:22pt; border-bottom:2px solid #0B1B34; padding-bottom:6px;\">Stage 3 — Reusable components<\u002Fh2>\n<p style=\"color:#4B5768;\">Each entry: purpose, when to use, visual treatment, mobile behaviour, desktop behaviour, key states, implementation notes.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">App shell<\u002Fh3>\n<p><b>Purpose:<\u002Fb> the persistent frame — header + bottom nav (mobile) or header + side rail (desktop) — every page mounts inside it.<br>\n<b>When:<\u002Fb> every screen except full-bleed Welcome.<br>\n<b>Visual:<\u002Fb> brand-navy header bar, wordmark left, theme + avatar right; content on page-surface background.<br>\n<b>Mobile:<\u002Fb> fixed bottom nav, 5 items, safe-area aware.<br>\n<b>Desktop:<\u002Fb> header keeps same content; nav moves to a persistent left rail with icon+label rows, same active-state rules.<br>\n<b>States:<\u002Fb> signed-in, guest, offline banner slot beneath header.<br>\n<b>Implementation:<\u002Fb> one shell component; page content is the only thing that changes; scroll position resets on navigation, not on tab re-selection.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Page header<\u002Fh3>\n<p><b>Purpose:<\u002Fb> orient the user — what page, why it matters, one primary action.<br>\n<b>When:<\u002Fb> top of every non-hero page.<br>\n<b>Visual:<\u002Fb> eyebrow label, Big Shoulders title, one-line description, optional single primary/secondary button pair.<br>\n<b>Mobile:<\u002Fb> stacks title above description above actions.<br>\n<b>Desktop:<\u002Fb> title/description left, actions right, single row.<br>\n<b>States:<\u002Fb> plain, with a persistent status chip (e.g. \"Locked\").<br>\n<b>Implementation:<\u002Fb> title and description are content props, never hardcoded per page component.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Section header<\u002Fh3>\n<p><b>Purpose:<\u002Fb> label a block within a page and optionally link to \"see all.\"<br>\n<b>When:<\u002Fb> above any repeated group of cards (fixtures, leagues, players).<br>\n<b>Visual:<\u002Fb> 16–18px heading, right-aligned muted link.<br>\n<b>Mobile/Desktop:<\u002Fb> identical, single row.<br>\n<b>States:<\u002Fb> with/without the trailing link.<br>\n<b>Implementation:<\u002Fb> link is optional prop; never omit the heading even when a link exists.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Status chip<\u002Fh3>\n<p><b>Purpose:<\u002Fb> compress a state into a scannable label.<br>\n<b>When:<\u002Fb> any of the six semantic roles (confirmed/provisional/live/locked/joker/info) needs surfacing on a card or header.<br>\n<b>Visual:<\u002Fb> pill, icon+label, one of the six fixed colour pairs — see Stage 2 §7.<br>\n<b>Mobile/Desktop:<\u002Fb> identical; wraps to a new line rather than truncating.<br>\n<b>States:<\u002Fb> the six roles; disabled/ghost variant for \"not yet available.\"<br>\n<b>Implementation:<\u002Fb> a single `role` prop drives colour+icon+default label; never hand-picked colours per usage.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Primary card<\u002Fh3>\n<p><b>Purpose:<\u002Fb> the main content container for a page's core object.<br>\n<b>When:<\u002Fb> a group table, a bracket round, a league, a rules block.<br>\n<b>Visual:<\u002Fb> white surface, 16px radius, 1px border, 16–20px padding, single elevation shadow.<br>\n<b>Mobile:<\u002Fb> full content width minus page gutter.<br>\n<b>Desktop:<\u002Fb> constrained max-width, can sit in a 2-column grid.<br>\n<b>States:<\u002Fb> default, tappable/hover, disabled.<br>\n<b>Implementation:<\u002Fb> never nests a second bordered card inside it.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Broadcast hero card<\u002Fh3>\n<p><b>Purpose:<\u002Fb> the one \"this feels like a live tournament\" moment per page.<br>\n<b>When:<\u002Fb> Home countdown, Welcome, Tournament Overview header, a league's hero strip.<br>\n<b>Visual:<\u002Fb> full-bleed placeholder photo, navy gradient scrim, white Big Shoulders headline, tabular-num countdown or key stat.<br>\n<b>Mobile:<\u002Fb> ~200–240px tall, content bottom-anchored.<br>\n<b>Desktop:<\u002Fb> wider, ~280–320px, headline and stat side-by-side.<br>\n<b>States:<\u002Fb> image loaded, image-failed fallback to flat navy, reduced-motion (no parallax).<br>\n<b>Implementation:<\u002Fb> at most one per page; never behind a table or list.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Fixture card<\u002Fh3>\n<p><b>Purpose:<\u002Fb> represent one match and the user's pick for it.<br>\n<b>When:<\u002Fb> Groups, KO Predictor, Home's featured match, Results.<br>\n<b>Visual:<\u002Fb> two team rows (flag+name), centred score/kickoff mark, status chip, footer linking onward.<br>\n<b>Mobile:<\u002Fb> stacked teams, full width.<br>\n<b>Desktop:<\u002Fb> teams side-by-side with centred score mark, grid of 2–3 per row.<br>\n<b>States:<\u002Fb> upcoming (score input, editable), locked (read-only, \"Match Centre\" link, no edit action), live (pulsing chip, live minute), final (result + points chip).<br>\n<b>Implementation:<\u002Fb> the same card anatomy is reused across Groups/KO/Home/Results per charter — do not fork a new layout per page.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Match Centre card<\u002Fh3>\n<p><b>Purpose:<\u002Fb> the expanded, single-match destination reached by tapping any fixture card.<br>\n<b>When:<\u002Fb> from any fixture/result/bracket-match tap-through.<br>\n<b>Visual:<\u002Fb> larger hero fixture header, then Original/KO tabs kept visually separate, then a read-only comparison panel.<br>\n<b>Mobile:<\u002Fb> full-screen page.<br>\n<b>Desktop:<\u002Fb> centred column, max 720px.<br>\n<b>States:<\u002Fb> pre-lock (editable inline), locked, live, final.<br>\n<b>Implementation:<\u002Fb> always shows a return path to wherever it was opened from (fixture list, bracket, results).<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Group table<\u002Fh3>\n<p><b>Purpose:<\u002Fb> standings for one group, predicted or live.<br>\n<b>When:<\u002Fb> Groups page, Match Centre group context, Player View table evidence.<br>\n<b>Visual:<\u002Fb> compact numeric table per Stage 2 §11, header naming the context (\"Live Group A\" vs \"Your predicted Group A\") so predicted and live never look interchangeable.<br>\n<b>Mobile:<\u002Fb> horizontally compact, GD/Pts always visible, P/W/D/L may collapse behind a toggle on very narrow screens.<br>\n<b>Desktop:<\u002Fb> full columns, six groups can sit in a 2–3 column grid.<br>\n<b>States:<\u002Fb> not-started (all zero, muted), partially played, complete.<br>\n<b>Implementation:<\u002Fb> predicted-context tables always carry a distinct banner colour/border from live-context tables — never the same card treatment.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Prediction input row<\u002Fh3>\n<p><b>Purpose:<\u002Fb> capture one score/pick before lock.<br>\n<b>When:<\u002Fb> Groups score entry, KO Predictor score entry.<br>\n<b>Visual:<\u002Fb> two numeric steppers either side of a centred dash, joker toggle below, saved/saving inline indicator.<br>\n<b>Mobile:<\u002Fb> numeric keypad-friendly steppers, 48px targets.<br>\n<b>Desktop:<\u002Fb> same steppers, hover affordance added.<br>\n<b>States:<\u002Fb> empty, in-progress, saved, saving, locked (steppers replaced with a disabled read-only score display — never rendered as an editable input past lock).<br>\n<b>Implementation:<\u002Fb> locked state must be a structurally different render, not just a disabled attribute on the same input, so it can never be mistaken for editable.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Rank table<\u002Fh3>\n<p><b>Purpose:<\u002Fb> full ranked standings for a competition.<br>\n<b>When:<\u002Fb> Leaderboards, League standings.<br>\n<b>Visual:<\u002Fb> rank/avatar/name/points row, movement arrow, \"You\" row pinned/highlighted if off-screen.<br>\n<b>Mobile:<\u002Fb> name truncates, points always visible.<br>\n<b>Desktop:<\u002Fb> adds points-behind-leader and streak columns.<br>\n<b>States:<\u002Fb> pre-scoring empty state, live (movement arrows animate on update), tied ranks share one number.<br>\n<b>Implementation:<\u002Fb> every row opens Player View; Original and KO Predictor use two entirely separate instances of this table, never a combined one.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">League switcher<\u002Fh3>\n<p><b>Purpose:<\u002Fb> let a multi-league player view one league's standings at a time without repeating full tables.<br>\n<b>When:<\u002Fb> Leagues page, whenever the signed-in user is in 2+ leagues.<br>\n<b>Visual:<\u002Fb> horizontal pill/tab row of league names above a single standings view; selected pill filled action-blue.<br>\n<b>Mobile:<\u002Fb> horizontally scrollable pill row.<br>\n<b>Desktop:<\u002Fb> same row, all pills fit without scrolling up to ~6 leagues, then scrolls.<br>\n<b>States:<\u002Fb> 1 league (switcher hidden, table shown directly), 2+ leagues (switcher shown), no leagues (empty state + join/create actions).<br>\n<b>Implementation:<\u002Fb> switching leagues swaps the Rank table content only; header/actions stay put so the page doesn't feel like it reloaded.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Player row<\u002Fh3>\n<p><b>Purpose:<\u002Fb> a tappable identity — avatar + display name — used consistently everywhere a person appears.<br>\n<b>When:<\u002Fb> rank tables, league members, head-to-head picker.<br>\n<b>Visual:<\u002Fb> circular initials/avatar, display name, optional \"You\" tag, chevron.<br>\n<b>Mobile/Desktop:<\u002Fb> identical, full row tappable (not just the chevron).<br>\n<b>States:<\u002Fb> self, other player, claimed vs offline/unclaimed placeholder player.<br>\n<b>Implementation:<\u002Fb> one shared component opens the same Player View everywhere — no page invents its own player link.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Points breakdown row<\u002Fh3>\n<p><b>Purpose:<\u002Fb> itemise how a score total was built.<br>\n<b>When:<\u002Fb> Points Breakdown page, Player View points story.<br>\n<b>Visual:<\u002Fb> label left, points earned right (tabular), joker rows carry the gold chip.<br>\n<b>Mobile:<\u002Fb> stacks label/points if the label is long; otherwise one line.<br>\n<b>Desktop:<\u002Fb> adds a match/context sub-label under each row.<br>\n<b>States:<\u002Fb> earned, zero, joker-doubled, hidden-until-lock (for another player's provisional picks).<br>\n<b>Implementation:<\u002Fb> Original and KO breakdowns render as two separate row groups, never merged into one running total.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Bracket match card<\u002Fh3>\n<p><b>Purpose:<\u002Fb> one knockout tie, winner-only pick.<br>\n<b>When:<\u002Fb> Original Bracket only (KO Predictor uses the Fixture card with scores instead).<br>\n<b>Visual:<\u002Fb> two team rows with slot codes (e.g. \"1A\"/\"2C\") when unresolved, tap-to-select the advancing team, no score fields, no method control, no joker control anywhere on this card.<br>\n<b>Mobile:<\u002Fb> stacked portrait cards per round.<br>\n<b>Desktop:<\u002Fb> converging wall-chart columns (R16 outer → QF → SF → Final centred).<br>\n<b>States:<\u002Fb> unresolved (dashed slot codes), resolved-unpicked, picked, locked.<br>\n<b>Implementation:<\u002Fb> visually and structurally distinct from every KO Predictor card — different card shell, not just a hidden score field.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Champion reveal card<\u002Fh3>\n<p><b>Purpose:<\u002Fb> the single celebratory moment at the foot of the bracket.<br>\n<b>When:<\u002Fb> Original Bracket, appears only after Match 51 (the Final) is picked; never above it.<br>\n<b>Visual:<\u002Fb> the one place a broadcast hero treatment is allowed inside Bracket — navy/gold accent, larger team badge, trophy-style icon (not emoji).<br>\n<b>Mobile/Desktop:<\u002Fb> full-width beneath the Final card either layout.<br>\n<b>States:<\u002Fb> not yet selected (muted placeholder), selected (full celebration treatment).<br>\n<b>Implementation:<\u002Fb> always positioned after Match 51 in DOM order, never floated above it.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Review checklist<\u002Fh3>\n<p><b>Purpose:<\u002Fb> show completion progress and surface what's left before predictions lock.<br>\n<b>When:<\u002Fb> the Review page, and as a compact strip on Home pre-lock.<br>\n<b>Visual:<\u002Fb> progress bar/ring, count \"47/51,\" grouped list of incomplete items each linking straight to the relevant input.<br>\n<b>Mobile:<\u002Fb> vertical list.<br>\n<b>Desktop:<\u002Fb> two-column list.<br>\n<b>States:<\u002Fb> incomplete (action items listed), complete (celebratory confirmation, no more action items), locked (read-only, historical record framing).<br>\n<b>Implementation:<\u002Fb> each incomplete row deep-links to the exact fixture/bracket tie, not just to the page in general.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Empty state<\u002Fh3>\n<p><b>Purpose:<\u002Fb> explain why a section has nothing to show, without feeling broken.<br>\n<b>When:<\u002Fb> no leagues joined, no scored points yet, no live matches.<br>\n<b>Visual:<\u002Fb> outline icon, one specific sentence, one primary action.<br>\n<b>Mobile/Desktop:<\u002Fb> identical, centred within its card.<br>\n<b>States:<\u002Fb> \"not started yet\" vs \"nothing matched this filter\" get different copy.<br>\n<b>Implementation:<\u002Fb> copy is written per-context (never a generic \"No data\" reused everywhere).<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Locked state<\u002Fh3>\n<p><b>Purpose:<\u002Fb> make \"this can no longer change\" unmistakable.<br>\n<b>When:<\u002Fb> any prediction input past its kick-off/lock time.<br>\n<b>Visual:<\u002Fb> slate \"Locked\" chip, muted (not hidden) content, lock icon, no edit affordance of any kind — a \"Match Centre\" link replaces it.<br>\n<b>Mobile/Desktop:<\u002Fb> identical.<br>\n<b>States:<\u002Fb> locked-no-pick-made (shown plainly, no shaming copy), locked-with-pick (pick shown read-only).<br>\n<b>Implementation:<\u002Fb> this is a structurally different card render from the editable one, not a CSS-disabled version of it.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Error state<\u002Fh3>\n<p><b>Purpose:<\u002Fb> fail calmly and offer a way forward.<br>\n<b>When:<\u002Fb> a save/load fails, an unknown route is hit.<br>\n<b>Visual:<\u002Fb> muted icon, plain-language sentence, \"Try again\" secondary button, \"Back to Home\" tertiary link.<br>\n<b>Mobile/Desktop:<\u002Fb> identical, centred.<br>\n<b>States:<\u002Fb> transient (retry likely to work) vs persistent (suggest returning home).<br>\n<b>Implementation:<\u002Fb> never surfaces a raw error code or stack to the player.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Modal sheet<\u002Fh3>\n<p><b>Purpose:<\u002Fb> a focused, interruptive task (claim a player, transfer guest picks, confirm a destructive action).<br>\n<b>When:<\u002Fb> Guest Transfer, Offline Player Claim, destructive confirmations.<br>\n<b>Visual/Mobile/Desktop/States:<\u002Fb> per Stage 2 §12.<br>\n<b>Implementation:<\u002Fb> one shared sheet/modal shell; content is the only thing that varies per use.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:15pt; color:#163B73; margin-top:22px;\">Bottom navigation<\u002Fh3>\n<p><b>Purpose:<\u002Fb> primary five-destination wayfinding.<br>\n<b>When:<\u002Fb> every mobile screen; desktop uses the equivalent left rail.<br>\n<b>Visual/States:<\u002Fb> per Stage 2 §9.<br>\n<b>Implementation:<\u002Fb> Position 1 label/icon/destination swap together, driven by tournament-readiness state, never a hardcoded date; the swap must never flash the wrong label mid-load.<\u002Fp>\n\n<div style=\"height:1px; background:#D9E0EA; margin:34px 0;\"><\u002Fdiv>\n\n<h2 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:22pt; border-bottom:2px solid #0B1B34; padding-bottom:6px;\">Stage 4 — Page contracts (priority pages)<\u002Fh2>\n<p style=\"color:#4B5768;\">Home, Groups, Original Bracket and Leagues, contracted first as requested. Remaining 18 pages get lighter contracts once these are approved.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#163B73; margin-top:26px;\">Home<\u002Fh3>\n<p><b>Purpose:<\u002Fb> the daily return point — where things stand and what to do next, in one glance.<br>\n<b>Primary action:<\u002Fb> pre-lock, finish remaining predictions; post-lock, check the featured match / today's points.<br>\n<b>Hierarchy:<\u002Fb> countdown-to-lock hero → your prediction progress + primary CTA → featured/next match card → quick stat strip (rank, points, leagues) → leagues teaser → rules link.<br>\n<b>Mobile layout:<\u002Fb> single column, hero first, everything stacked, bottom nav.<br>\n<b>Desktop layout:<\u002Fb> hero full-width top band; below it a 2-column grid — progress+CTA and featured match on the left (wider), rank strip + leagues teaser stacked on the right (narrower rail).<br>\n<b>Components:<\u002Fb> Broadcast hero card, Review checklist (compact), Fixture card, rank-strip variant of Rank table, Section header.<br>\n<b>States:<\u002Fb> pre-tournament (countdown to first kick-off), matchday-live (featured match shows live chip + minute), post-match (results-led), locked-with-gaps (never shown as an editable prompt — those slots simply show as missed).<br>\n<b>Return path:<\u002Fb> Home is the root — no return path needed; it is the return path for everything else.<br>\n<b>Copy notes:<\u002Fb> no \"Gameweek\" wording — use \"Round points\" / \"Today's points\"; the countdown label is the lock, not a generic tournament clock.<br>\n<b>Implementation:<\u002Fb> content and ordering are state-driven from tournament/lock state, never a hardcoded date check in the component.<br>\n<b>Must not happen:<\u002Fb> KO Predictor must not compete for primary visual weight with the Original Predictor before KO readiness; no edit affordance on any locked featured match.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#163B73; margin-top:26px;\">Groups<\u002Fh3>\n<p><b>Purpose:<\u002Fb> enter and track all 36 group-stage score predictions plus jokers.<br>\n<b>Primary action:<\u002Fb> fill in the next unscored match.<br>\n<b>Hierarchy:<\u002Fb> compact status strip (progress, joker meter, by-group/by-date toggle) → group sections, each a Section header + 6 Fixture cards with inline Prediction input rows → collapsible predicted table + third-place watchlist per group.<br>\n<b>Mobile layout:<\u002Fb> one group at a time in view, sticky status strip at top, collapsible tables tucked below each group's fixtures.<br>\n<b>Desktop layout:<\u002Fb> two-column grid of group sections; predicted tables shown as a persistent side panel rather than a collapsible, since there's room.<br>\n<b>Components:<\u002Fb> Section header, Fixture card, Prediction input row, Group table, Status chip (joker/provisional).<br>\n<b>States:<\u002Fb> not-started, in-progress (partial saves), complete-per-group, locked (post kick-off, per-match — earlier matches lock while later ones stay editable).<br>\n<b>Return path:<\u002Fb> Groups is a primary nav destination; its own \"Continue to your bracket\" CTA is the forward path once group predictions are complete.<br>\n<b>Copy notes:<\u002Fb> avoid exposing internal/provisional-slot language beyond what's needed; \"Qualifying under way\" reads as tournament status, not a system state.<br>\n<b>Implementation:<\u002Fb> live-table and predicted-table are visually distinct card treatments (per Stage 3 Group table) so a player never mistakes one for the other.<br>\n<b>Must not happen:<\u002Fb> no combined Original/KO joker meter; a locked match must never still show numeric steppers.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#163B73; margin-top:26px;\">Original Bracket<\u002Fh3>\n<p><b>Purpose:<\u002Fb> one winner-only pre-tournament bracket built from the player's own predicted group tables.<br>\n<b>Primary action:<\u002Fb> pick the advancing team for the next unresolved tie.<br>\n<b>Hierarchy:<\u002Fb> progress + predicted-champion summary → round rail (R16/QF/SF/F counts) → Bracket match cards grouped by round → Champion reveal card, always last, below Match 51.<br>\n<b>Mobile layout:<\u002Fb> vertical stacked cards per round, one round visible at a time via round rail tabs.<br>\n<b>Desktop layout:<\u002Fb> converging wall chart — R16 in outer wings, QF/SF inward, Final and Champion reveal centred.<br>\n<b>Components:<\u002Fb> Bracket match card, Champion reveal card, Status chip (protected/locked).<br>\n<b>States:<\u002Fb> slot-unresolved (dashed \"TBC\" placeholders), resolved-unpicked, picked, locked.<br>\n<b>Return path:<\u002Fb> reached from bottom nav directly; a persistent link back to Groups covers \"my tables changed, why did my bracket change.\"<br>\n<b>Copy notes:<\u002Fb> the only KO Predictor mention permitted here is a single line clarifying it's a separate competition; never show a score, a method, or a joker control on this page.<br>\n<b>Implementation:<\u002Fb> uses the same slot-code/tie primitives at both breakpoints — one state model, two layouts.<br>\n<b>Must not happen:<\u002Fb> no score inputs, no method controls, no bracket jokers, no champion reveal above Match 51, no visual blending with the live/real bracket.<\u002Fp>\n\n<h3 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:16pt; color:#163B73; margin-top:26px;\">Leagues<\u002Fh3>\n<p><b>Purpose:<\u002Fb> track private-league standings and manage membership, for however many leagues the player is in.<br>\n<b>Primary action:<\u002Fb> check where you rank in a league; invite/join a league.<br>\n<b>Hierarchy:<\u002Fb> League switcher → hero strip for the selected league (name, member count) → Original Predictor standings (Rank table) → KO Predictor standings (separate Rank table, own tab/section) → actions (copy invite, share, settings).<br>\n<b>Mobile layout:<\u002Fb> switcher as a scrollable pill row, one league's content below.<br>\n<b>Desktop layout:<\u002Fb> switcher as a left-hand list of leagues; selected league's full content fills the remaining width — no repeated full tables stacked one after another.<br>\n<b>Components:<\u002Fb> League switcher, Broadcast hero card (subtle, league-scoped), Rank table, Player row, Section header.<br>\n<b>States:<\u002Fb> zero leagues (empty state + create/join actions), one league (switcher hidden), 2+ leagues (switcher shown), pre-scoring (empty rank table state).<br>\n<b>Return path:<\u002Fb> primary nav destination; a rank table row opens Player View, which returns to this exact league/tab.<br>\n<b>Copy notes:<\u002Fb> one public display name per player throughout — never a second identity format inside league context.<br>\n<b>Implementation:<\u002Fb> switching leagues must not reset scroll position or flash a loading skeleton if data is already cached client-side.<br>\n<b>Must not happen:<\u002Fb> Original and KO Predictor standings must never merge into one combined number.<\u002Fp>\n\n<div style=\"height:1px; background:#D9E0EA; margin:34px 0;\"><\u002Fdiv>\n\n<h2 style=\"font-family:'Big Shoulders Display',sans-serif; font-size:22pt; border-bottom:2px solid #0B1B34; padding-bottom:6px;\">Stage 4 (cont.) — Lighter contracts, remaining 18 pages<\u002Fh2>\n<p style=\"color:#4B5768;\">Shorter form: purpose, primary action, key states, return path, must-not-happen. All inherit Stage 2/3 components and rules by default.<\u002Fp>\n\n<sc-raw-table style=\"width:100%; border-collapse:collapse; margin-top:10px; font-size:10.2pt;\">\n<sc-raw-tr style=\"background:#0B1B34; color:#fff;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Page<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Purpose / primary action<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Key states<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Return path<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Must not happen<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">KO Predictor<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Predict the 15 real knockout fixtures once known; primary action: enter 90-min score, expand to extra time/pens on a draw, pick advancing team.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">not-yet-open (explainer only), open-pending, scored-with-90-min-draw expansion, locked.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Bottom nav / More.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Never shares a card style, joker meter or points total with Original Bracket; never shown before its own fixtures are known.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Review<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Final check before lock; primary action: jump to any incomplete pick and confirm submission.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">incomplete (checklist), complete (confirmation), locked (read-only record).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Home / Groups.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">No silent auto-submit; every gap must be individually visible and linkable.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Leaderboards<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Full public standings; primary action: switch Original/KO, open a player.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">pre-scoring empty, live (movement arrows), tie handling.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Bottom nav / More.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Never combine Original and KO into one ranked list.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Match Centre<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Deep dive on one fixture; primary action varies by lock state (edit pre-lock, read post-lock).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">pre-lock editable, locked read-only, live, final with points earned.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Wherever it was opened from (fixture card, bracket, results) — never defaults to Home.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">No edit affordance once locked; never blends Original/KO context for the same fixture.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Results<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Official scores/live tables/live bracket, separate from personal picks; primary action: open a result's Match Centre.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">pre-tournament (all upcoming), live, completed.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Bottom nav / More.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Never edits or references the player's saved predictions directly on this page.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Player View<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">See another (or own) player's released picks/stats; primary action: open Points Breakdown.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">own-view (full detail), other-player pre-lock (hidden/safe context only), other-player post-lock (revealed).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Wherever the player row was tapped from.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Never leaks another player's pre-lock Original Predictor picks.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Points Breakdown<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Itemise how a total was built; primary action: scan rows, jump to a scoring match.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">empty pre-scoring, populated, joker-doubled rows highlighted.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Player View (if opened from there) or Leaderboards.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Original and KO rows never share one running total.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Bracket Health<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Show predicted-bracket survival against live results; primary action: none — read-only diagnostic.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">on your path, alive on a different path, route conflict, out; points-still-available strip.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Sub-tab inside Bracket (Locked state) — not a standalone nav item.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Never becomes a bottom-nav destination; never edits the saved bracket.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Team Profile Sheet<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Objective team reference info; primary action: none — informational.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">pre-lock (\"how players see them\" hidden), post-lock (revealed).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Wherever the team name was tapped from.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">No squad/player/odds content, ever.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Shared States<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Reference sheet, not a real page: More menu, shimmer loading, calm error, unknown route, invite/join, privacy placeholders.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Each state as its own documented instance.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">n/a — a component reference, always paired with a real return action wherever used.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">No raw error text or unknown-route dead end without a recovery action.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Offline Player Claim<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Let a real person claim a placeholder/offline player record via a league-admin code; primary action: enter code, confirm claim.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">unclaimed, code-entry, claimed (one-way, history intact).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">The league/member list that opened it.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Claim is one-way — no unclaim/undo flow implied.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Guest Transfer modal<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">One-time choice for a signing-in guest: keep local picks or start fresh; primary action: pick one, confirm.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">default (both options equal weight), confirming, done.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Closes back to wherever sign-in was triggered.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Never a persistent nagging card — one-time only, per Account contract.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Account<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Profile, security, quick stats, leagues shortcut, danger zone; primary action varies (update name, change password, sign out).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">signed-in, guest, coming-soon rows clearly inert.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Bottom nav / More.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">No persistent guest-transfer card; destructive actions isolated and confirmed.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Tournament Overview<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Football facts: hosts, venues, dates, format; primary action: none — reference, with a link into How to Play.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">static content, minor \"confirmed vs provisional\" chip use.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">More.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Must not read as predictor mechanics — that's How to Play's job.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">How to Play<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Predictor mechanics: scoring, locks, rules; primary action: \"Start predicting\" CTA.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">static content, section-jump navigation.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">More.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">No internal/spec wording; user-facing language only.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Admin Control Room<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Tournament operations for authorised admins; primary action varies by section (results entry, corrections, audit).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">role-gated, audit-filtered, guardrail-confirmed destructive actions.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Admin's own section nav.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Never visible/reachable for unauthorised users; visual polish only — no loosening of authorisation.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr style=\"border-bottom:1px solid #EAEEF4;\"><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Welcome<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">First-touch arrival for a brand-new visitor; primary action: continue as guest or sign up.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">first-visit only; never re-shown to a returning signed-in user uninvited.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">n/a — it is the entry point.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">No functional promises beyond what's actually open yet (e.g. signups if currently closed).<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<sc-raw-tr><sc-raw-td style=\"padding:7px 8px; font-weight:700;\">Head-to-Head<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Compare two players' picks/points side by side; primary action: pick the second player to compare against.<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">picker-empty, populated, pre-lock-safe (hides the other's hidden picks).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Wherever it was launched from (Player View / league).<\u002Fsc-raw-td><sc-raw-td style=\"padding:7px 8px;\">Never exposes a player's pre-lock Original Predictor picks to the comparison.<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n\n<\u002Fsc-raw-table>\n\n<div style=\"height:1px; background:#D9E0EA; margin:34px 0 18px;\"><\u002Fdiv>\n<p style=\"color:#7C879A; font-size:10.5pt;\">Stage 5 visual concepts delivered for Home, Groups, Original Bracket, Leagues (see companion file). Say the word if you'd like additional pages visualised, or move straight to Stage 6 handoff.<\u002Fp>\n\n<\u002Fdoc-page>\n<\u002Fx-import>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
